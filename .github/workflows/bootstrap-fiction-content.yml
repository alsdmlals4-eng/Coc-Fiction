name: Bootstrap fiction content

on:
  push:
    branches:
      - fiction/source-integration-2026-07-22
    paths:
      - ".bootstrap/**"
      - ".github/workflows/bootstrap-fiction-content.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".bootstrap/**"
      - ".github/workflows/bootstrap-fiction-content.yml"

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Reconstruct latest fiction documents
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f .bootstrap/bootstrap_generate_content.py ]]; then
            echo 'Bootstrap already completed.'
            exit 0
          fi
          cat .bootstrap/chunk-* \
            | grep -v -E '^(BEGIN|END)[0-9][0-9]$' \
            | tr -d '\n\r' \
            | base64 -d > /tmp/coc-fiction-seed.tar.xz
          tar -xJf /tmp/coc-fiction-seed.tar.xz
          curl -L --fail --retry 3 \
            'https://docs.google.com/document/d/1Q753033aiMhYBMOE8NodXaRKcpH9S2NdBMg31CKC2HI/export?format=txt' \
            -o /tmp/integrated.txt
          if ! curl -L --fail --retry 2 \
            'https://docs.google.com/document/d/14sPx4rmIaUXlRJvCIj_FKp9osm5fOElZwUzIpGBx198/export?format=txt' \
            -o /tmp/handoff.txt; then
            printf '구 인수인계 원문을 내려받지 못함. 활성 인수인계는 별도 정본을 사용한다.\n' > /tmp/handoff.txt
          fi
          python .bootstrap/bootstrap_generate_content.py /tmp/integrated.txt /tmp/handoff.txt "$GITHUB_WORKSPACE"
          python -m json.tool fiction/MANUSCRIPT_INDEX.json >/dev/null
          test "$(find fiction/manuscript -type f -name '*.md' | wc -l)" -eq 45
          test "$(grep -Rho '^## 제[0-9]\+화 · ' fiction/manuscript | wc -l)" -eq 225
          ! grep -R -n -E '쵸르브라트|미하일 카쉬프|피엘렛토|붉은 늑대' fiction/manuscript
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-fiction-content.yml
      - name: Commit generated content
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No generated changes to commit.'
            exit 0
          fi
          git commit -m 'docs: integrate latest canon and expanded 225-chapter manuscript'
          target_branch='${{ github.event.pull_request.head.ref || github.ref_name }}'
          git push origin "HEAD:${target_branch}"
