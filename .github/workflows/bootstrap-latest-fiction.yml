name: Integrate latest fiction canon

on:
  push:
    branches:
      - fiction/latest-canon-integration-2026-07-22
    paths:
      - ".bootstrap/**"
      - ".github/workflows/bootstrap-latest-fiction.yml"

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate active canon and manuscript
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f .bootstrap/bootstrap_latest_fiction.py ]]; then
            echo 'Bootstrap already completed.'
            exit 0
          fi
          curl -L --fail --retry 3 \
            'https://docs.google.com/document/d/1Q753033aiMhYBMOE8NodXaRKcpH9S2NdBMg31CKC2HI/export?format=txt' \
            -o /tmp/integrated.txt
          python .bootstrap/bootstrap_latest_fiction.py /tmp/integrated.txt "$GITHUB_WORKSPACE"
          python tools/check_fiction_operating_system.py
          python tools/check_fiction_content.py
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-latest-fiction.yml
      - name: Commit generated content
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No generated changes to commit.'
            exit 0
          fi
          git commit -m 'docs: integrate latest canon and expanded 225-chapter manuscript'
          git push origin HEAD:fiction/latest-canon-integration-2026-07-22
