name: Fiction operating system

on:
  pull_request:
    paths:
      - "**/00_운영체계/**"
      - "docs/fiction-ops/**"
      - "docs/coordination/**"
      - "templates/fiction-ops/**"
      - "skills/fiction-*/**"
      - "skills/FICTION_SKILL_LEARNING_LOG.md"
      - "fiction/**"
      - "tools/check_fiction_operating_system.py"
      - "tools/check_fiction_content.py"
      - ".github/workflows/fiction-ops-validation.yml"
      - ".github/PULL_REQUEST_TEMPLATE/fiction-change.md"
  push:
    branches: [main]
    paths:
      - "**/00_운영체계/**"
      - "docs/fiction-ops/**"
      - "docs/coordination/**"
      - "templates/fiction-ops/**"
      - "skills/fiction-*/**"
      - "skills/FICTION_SKILL_LEARNING_LOG.md"
      - "fiction/**"
      - "tools/check_fiction_operating_system.py"
      - "tools/check_fiction_content.py"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate fiction operating system
        run: python tools/check_fiction_operating_system.py
      - name: Capture active fiction validation
        id: fiction_content
        continue-on-error: true
        shell: bash
        run: python tools/check_fiction_content.py > fiction-content-validation.log 2>&1
      - name: Upload validation diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fiction-content-validation
          path: fiction-content-validation.log
      - name: Enforce active fiction validation
        if: always()
        shell: bash
        run: |
          cat fiction-content-validation.log
          test "${{ steps.fiction_content.outcome }}" = "success"
