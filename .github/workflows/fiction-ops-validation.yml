name: Fiction operating system

on:
  pull_request:
    paths:
      - ".source-pass/**"
      - "**/00_운영체계/**"
      - "docs/fiction-ops/**"
      - "docs/coordination/**"
      - "templates/fiction-ops/**"
      - "skills/fiction-*/**"
      - "skills/FICTION_SKILL_LEARNING_LOG.md"
      - "fiction/**"
      - "tools/**"
      - ".github/workflows/fiction-ops-validation.yml"
      - ".github/PULL_REQUEST_TEMPLATE/fiction-change.md"

permissions:
  contents: write

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply verified source pass
        run: python .source-pass/apply_source_pass_091_095.py
      - name: Validate fiction operating system
        run: python tools/check_fiction_operating_system.py
      - name: Diagnose active fiction content
        run: |
          set +e
          python tools/check_fiction_content.py > /tmp/content-diagnostic.txt 2>&1
          status=$?
          set -e
          cat /tmp/content-diagnostic.txt
          if [ "$status" -ne 0 ]; then
            cp /tmp/content-diagnostic.txt CONTENT_DIAGNOSTIC.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CONTENT_DIAGNOSTIC.txt
            git commit -m "진단: 외전1 콘텐츠 검사 결과"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
            exit 1
          fi
      - name: Check reverse-outline reproducibility
        run: python tools/build_fiction_reverse_outline.py --check
      - name: Validate reverse-outline analysis
        run: python tools/check_fiction_reverse_outline.py
      - name: Validate completed scene passes
        run: python tools/check_fiction_scene_passes.py
      - name: Commit verified source pass
        run: |
          git diff --check
          test ! -e .source-pass
          grep -q "contents: read" .github/workflows/fiction-ops-validation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "제91화~제95화 원본 직접 대조와 외전1 종결 복원"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
