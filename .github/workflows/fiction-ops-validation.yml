name: Fiction operating system

on:
  pull_request:
    paths:
      - "**/00_운영체계/**"
      - "docs/fiction-ops/**"
      - "docs/coordination/**"
      - "templates/fiction-ops/**"
      - "skills/fiction-*/**"
      - "skills/FICTION_SKILL_LEARNING_LOG.md"
      - "fiction/**"
      - "tools/check_fiction_operating_system.py"
      - "tools/check_fiction_content.py"
      - ".github/workflows/fiction-ops-validation.yml"
      - ".github/PULL_REQUEST_TEMPLATE/fiction-change.md"
  push:
    branches: [main]
    paths:
      - "**/00_운영체계/**"
      - "docs/fiction-ops/**"
      - "docs/coordination/**"
      - "templates/fiction-ops/**"
      - "skills/fiction-*/**"
      - "skills/FICTION_SKILL_LEARNING_LOG.md"
      - "fiction/**"
      - "tools/check_fiction_operating_system.py"
      - "tools/check_fiction_content.py"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate fiction operating system
        run: python tools/check_fiction_operating_system.py
      - name: Validate active fiction canon and manuscript
        run: python tools/check_fiction_content.py
      - name: Package current canon for reverse-outline audit
        run: |
          tar -czf fiction-reverse-outline-source.tar.gz \
            fiction/FICTION_MASTER.md \
            fiction/ACTIVE_CONTEXT.md \
            fiction/HANDOFF.md \
            fiction/CANON_REGISTRY.json \
            fiction/MANUSCRIPT_INDEX.json \
            fiction/STYLE_GUIDE.md \
            fiction/SOURCE_MANIFEST.md \
            fiction/bible \
            fiction/manuscript \
            skills/fiction-story-development/SKILL.md \
            skills/fiction-revision-and-validation/SKILL.md
      - name: Upload reverse-outline source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: fiction-reverse-outline-source
          path: fiction-reverse-outline-source.tar.gz
          retention-days: 1
