name: Fiction operating system

on:
  pull_request:
    paths:
      - "**/00_운영체계/**"
      - "docs/fiction-ops/**"
      - "docs/coordination/**"
      - "templates/fiction-ops/**"
      - "skills/fiction-*/**"
      - "skills/FICTION_SKILL_LEARNING_LOG.md"
      - "fiction/**"
      - "tools/check_fiction_operating_system.py"
      - "tools/check_fiction_content.py"
      - "tools/build_fiction_reverse_outline.py"
      - "tools/check_fiction_reverse_outline.py"
      - ".github/workflows/fiction-ops-validation.yml"
      - ".github/PULL_REQUEST_TEMPLATE/fiction-change.md"
  push:
    branches: [main]
    paths:
      - "**/00_운영체계/**"
      - "docs/fiction-ops/**"
      - "docs/coordination/**"
      - "templates/fiction-ops/**"
      - "skills/fiction-*/**"
      - "skills/FICTION_SKILL_LEARNING_LOG.md"
      - "fiction/**"
      - "tools/check_fiction_operating_system.py"
      - "tools/check_fiction_content.py"
      - "tools/build_fiction_reverse_outline.py"
      - "tools/check_fiction_reverse_outline.py"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate fiction operating system
        run: python tools/check_fiction_operating_system.py
      - name: Validate active fiction canon and manuscript
        run: python tools/check_fiction_content.py
      - name: Generate reverse-outline baseline
        run: python tools/build_fiction_reverse_outline.py
      - name: Validate generated reverse outline
        run: python tools/check_fiction_reverse_outline.py
      - name: Commit generated reverse outline
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add fiction/analysis/REVERSE_OUTLINE_001_225.json
          if git diff --cached --quiet; then
            echo 'Reverse outline is already current.'
            exit 0
          fi
          git commit -m '225화 구조 역개요 기준선 생성'
          target_branch='${{ github.event.pull_request.head.ref || github.ref_name }}'
          git push origin "HEAD:${target_branch}"
