name: Fiction operating system

on:
  pull_request:
    paths:
      - "**/00_운영체계/**"
      - "docs/fiction-ops/**"
      - "docs/coordination/**"
      - "templates/fiction-ops/**"
      - "skills/fiction-*/**"
      - "skills/FICTION_SKILL_LEARNING_LOG.md"
      - "fiction/**"
      - ".scene-pass/**"
      - "tools/check_fiction_operating_system.py"
      - "tools/check_fiction_content.py"
      - "tools/build_fiction_reverse_outline.py"
      - "tools/check_fiction_reverse_outline.py"
      - ".github/workflows/fiction-ops-validation.yml"
      - ".github/PULL_REQUEST_TEMPLATE/fiction-change.md"
  push:
    branches: [main]
    paths:
      - "**/00_운영체계/**"
      - "docs/fiction-ops/**"
      - "docs/coordination/**"
      - "templates/fiction-ops/**"
      - "skills/fiction-*/**"
      - "skills/FICTION_SKILL_LEARNING_LOG.md"
      - "fiction/**"
      - "tools/check_fiction_operating_system.py"
      - "tools/check_fiction_content.py"
      - "tools/build_fiction_reverse_outline.py"
      - "tools/check_fiction_reverse_outline.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply verified scene pass
        run: |
          set +e
          python .scene-pass/apply_scene_pass_006_010.py
          status=$?
          set -e
          echo "apply script status: $status"
          test -f fiction/analysis/SCENE_PASS_REGISTRY.json
          test -f fiction/analysis/SCENE_CARDS_006_010.md
          grep -q "복도에서 첫 총성이 울리기 전" fiction/manuscript/part-1/006-010.md
          grep -q "자기 안의 차가운 보호 반응" fiction/manuscript/part-1/006-010.md
          grep -q "조금 전 서비스 통로에서 데커와 총을 주고받는 동안" fiction/manuscript/part-1/006-010.md
      - name: Restore final read-only workflow
        run: |
          cp .scene-pass/final-fiction-ops-validation.yml .github/workflows/fiction-ops-validation.yml
          rm -rf .scene-pass
          rm -f .github/workflows/apply-scene-pass-006-010.yml
      - name: Validate fiction operating system
        run: python tools/check_fiction_operating_system.py
      - name: Validate active fiction canon and manuscript
        run: python tools/check_fiction_content.py
      - name: Check reverse-outline reproducibility
        run: python tools/build_fiction_reverse_outline.py --check
      - name: Validate reverse-outline analysis
        run: python tools/check_fiction_reverse_outline.py
      - name: Validate completed scene passes
        run: python tools/check_fiction_scene_passes.py
      - name: Commit generated scene pass
        run: |
          git diff --check
          test ! -e .scene-pass
          test ! -e .github/workflows/apply-scene-pass-006-010.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "제6화~제10화 장면 카드와 연속성 교정"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
